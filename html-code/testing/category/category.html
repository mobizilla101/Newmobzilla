<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Course Platform UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body class="relative w-full h-screen overflow-hidden">

  <!-- Background Image -->
 <div class="absolute top-0 left-0 w-screen h-screen z-0 overflow-hidden">
  <img src="../category/images/mobile-curcuit.jpg" alt="Background" class="w-full h-full object-cover">
</div>

  <!-- Foreground Content -->
  <div class="relative z-10 flex flex-col items-start justify-center h-full px-8 md:px-24 text-black">
    <h1 class="text-4xl md:text-5xl font-bold max-w-xl">Discover the Best Course for Your Journey</h1>
    <p class="mt-4 text-lg max-w-lg">Explore over 1000 courses tailored to your interests and career goals.</p>

    <!-- Search bar -->
    <div class="mt-6 flex w-full max-w-md">
      <input
        type="text"
        placeholder="Search..."
        class="flex-grow px-4 py-2 rounded-l-full border-t border-b border-l border-gray-300 focus:outline-none"
      />
      <button class="px-6 py-2 bg-cyan-600 text-white rounded-r-full hover:bg-cyan-700 transition">Search</button>
    </div>

    <!-- Popular Searches -->
    <div class="mt-4 flex gap-3 flex-wrap text-sm font-medium">
      <span class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full cursor-pointer">Web Development</span>
      <span class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full cursor-pointer">Machine Learning</span>
      <span class="px-3 py-1 bg-blue-100 text-blue-800 rounded-full cursor-pointer">UI/UX Design</span>
    </div>
  </div>

  <!-- Dinosaur Image -->
  <img
    id="dino"
    src="../category/images/dianosour.jpg"
    alt="Dino"
    class="absolute bottom-0 right-8 w-40 md:w-52 z-10"
  />

  <!-- GSAP Animation -->
  <script>
    gsap.to("#dino", {
      x: 30,
      duration: 2,
      yoyo: true,
      repeat: -1,
      ease: "power1.inOut"
    });
  </script>

</body>
</html>
