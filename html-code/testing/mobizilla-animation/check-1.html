<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .animate {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: flex-end;
        }
        
        .container {
            transform: translateX(20px);
        }
        
        .image-animation {
            position: relative;
            width: 300px;
            height: 500px;
        }
        
        .wave-image {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .wave-image.active {
            opacity: 1;
        }
    </style>
</head>
<body>
    <section class="animate">
    <div class="container">
        <div class="image-animation">
            <img src="../../Hompage/image/mobizilla-animation/varient-1.png" alt="Wave 1" class="wave-image" id="wave1">
            <img src="../../Hompage/image/mobizilla-animation/varient-2.png" alt="Wave 2" class="wave-image" id="wave2">
            <img src="../../Hompage/image/mobizilla-animation/varient-3.png" alt="Wave 3" class="wave-image" id="wave3">
            <img src="../../Hompage/image/mobizilla-animation/varient-4.png" alt="Wave 4" class="wave-image" id="wave4">
            <img src="../../Hompage/image/mobizilla-animation/varient-5.png" alt="Wave 5" class="wave-image" id="wave5">
            <img src="../../Hompage/image/mobizilla-animation/varient-6.png" alt="Wave 6" class="wave-image" id="wave6">
            <img src="../../Hompage/image/mobizilla-animation/varient-7.png" alt="Wave 7" class="wave-image" id="wave7">
            <img src="../../Hompage/image/mobizilla-animation/varient-8.png" alt="Wave 8" class="wave-image" id="wave8">
        </div>
    </div>
    </section>

    <script>
        const waveImages = document.querySelectorAll('.wave-image');
        let currentWaveIndex = 0;
        
        function animateWave() {
            waveImages.forEach(img => img.classList.remove('active'));
            waveImages[currentWaveIndex].classList.add('active');
            currentWaveIndex = (currentWaveIndex + 1) % waveImages.length;
        }
        
        setInterval(animateWave, 800);
        waveImages[0].classList.add('active');
    </script>
</body>
</html>
